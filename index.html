<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <link rel="stylesheet" href="./style.css"/>
    <script src="/sdk.js"></script>
    <style>
        /* Remove highlighting on key press */
        canvas:focus {
            outline: none;
        }

        html, body {
            /* Remove margins and padding */
            padding: 0;
            margin: 0;
            /* Disable scroll and long-tap on iOS */
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            /* Set height to 100% */
            height: 100%;
        }

        /* Loading bar rounded + animated stripes */
        #unity-progress-bar-empty {
            width: 320px;
            height: 16px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
        }

        #unity-progress-bar-full {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0.18) 100%),
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.35) 0px,
                    rgba(255, 255, 255, 0.35) 10px,
                    rgba(255, 255, 255, 0.12) 10px,
                    rgba(255, 255, 255, 0.12) 20px
                );
            background-size: 200% 100%, 40px 40px;
            animation: progressStripes 1.2s linear infinite;
        }

        #unity-progress-percent {
            margin-top: 8px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        @keyframes progressStripes {
            0% {
                background-position: 0% 0%, 0 0;
            }
            100% {
                background-position: 200% 0%, 40px 40px;
            }
        }
    </style>
</head>
<body class="dark">
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
        <div id="unity-loading-bar">
            <div id="unity-logo"><img src="logo.png"/></div>
            <div id="unity-progress-bar-empty" style="display: none;">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div id="unity-progress-percent" style="display: none;">0%</div>
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        const hideFullScreenButton = "";
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/Build.loader.js";
        const config = {
            dataUrl: buildUrl + "/Build.data.br",
            frameworkUrl: buildUrl + "/Build.framework.js.br",
            codeUrl: buildUrl + "/Build.wasm.br",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "StealBrainrot",
            productVersion: "0.1"
        };

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const progressPercent = document.querySelector("#unity-progress-percent");
        const spinner = document.querySelector('.spinner');

        const canFullscreen = (function () {
            for (const key of [
                'exitFullscreen',
                'webkitExitFullscreen',
                'webkitCancelFullScreen',
                'mozCancelFullScreen',
                'msExitFullscreen',
            ]) {
                if (key in document) {
                    return true;
                }
            }
            return false;
        }());

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            container.className = "unity-mobile";
        }

        // Background image during game loading. When building the project, the code changes depending on project settings.
        loadingCover.style.background = "url('background.jpg') center / cover";
        loadingCover.style.display = "";

        // Disable the context menu on right-click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Return focus if the screen is clicked
        function FocusGame() {
            window.focus();
            canvas.focus();
        }

        window.addEventListener('pointerdown', () => {
            FocusGame();
        });
        window.addEventListener('touchstart', () => {
            FocusGame();
        });

        document.addEventListener('visibilitychange', function () {
            if (ysdk !== null && initGame == true) {
                if (document.hidden) {
                    myGameInstance.SendMessage('YandexGame', 'OnVisibilityGameWindow', 'false');
                }
                else {
                    myGameInstance.SendMessage('YandexGame', 'OnVisibilityGameWindow', 'true');

                    if ((ysdk.deviceInfo.isMobile() || ysdk.deviceInfo.isTablet()) && ysdk.screen.fullscreen.status == 'off')
                        ysdk.screen.fullscreen.request();
                }
            }
        });

        function ResumeGame() {
            if (myGameInstance && myGameInstance.Module) {
                // Resuming the main Unity loop
                myGameInstance.Module.resumeMainLoop();
                // (The cursor may be hidden again if required by the game)
            }

            let audioElements = document.querySelectorAll('audio, video');
            audioElements.forEach(element => {
                element.muted = false;
            });
        }

        // ... [Rest of the Yandex SDK logic remains functionally the same] ...
    </script>
</body>
</html>
